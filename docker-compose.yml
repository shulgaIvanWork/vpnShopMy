services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: vpnbot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-vpnbot}
      POSTGRES_USER: ${DB_USER:-vpn_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - vpnbot-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-vpn_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # VPN Bot Application
  vpnbot:
    build: .
    container_name: vpnbot-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - MAX_BOT_TOKEN=${MAX_BOT_TOKEN}
      - MAX_BOT_USERNAME=${MAX_BOT_USERNAME}
      - BOT_ADMINS=${BOT_ADMINS}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=${DB_NAME:-vpnbot}
      - DB_USER=${DB_USER:-vpn_user}
      - DB_PASSWORD=${DB_PASSWORD}
      - XUI_SERVERS_JSON=${XUI_SERVERS_JSON}
      - SBER_PHONE=${SBER_PHONE}
      - SBER_RECIPIENT_NAME=${SBER_RECIPIENT_NAME}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
    volumes:
      - ./videos:/app/videos:ro
    networks:
      - vpnbot-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
    driver: local

networks:
  vpnbot-network:
    driver: bridge
